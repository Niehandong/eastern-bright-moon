# ============================================================
# 东方朗月 Eastern Bright Moon · Nginx 配置
# 单端口(80)统一入口：前端静态站点 + 后端反向代理
# 适用：Ubuntu 22.04，先用 IP 访问，后续可平滑切换域名/HTTPS
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # ⚠️ 暂时用 IP 访问，填 _ 即可匹配所有进入本机 80 端口的请求。
    #    以后有域名时，改成：server_name your.domain.com;
    server_name _;

    # 前端打包产物目录（npm run build 生成的 dist）
    # ⚠️ 改成你目标服务器上的真实路径
    root /home/ubuntu/opt/workerspace/eastern-bright-moon/frontend/dist;
    index index.html;

    # 允许上传大图片（后端有图片上传功能，默认 1M 太小会报 413）
    client_max_body_size 50M;

    # 访问/错误日志
    access_log /var/log/nginx/eastern.access.log;
    error_log  /var/log/nginx/eastern.error.log;

    # ---------- 后端接口反向代理 ----------
    # 前端用相对路径 /api 调用（需配合 VITE_API_URL=/api 打包）
    location /api/ {
        proxy_pass http://127.0.0.1:8998;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---------- 后端静态资源（上传的图片）反向代理 ----------
    # 上传接口返回的是 /static/uploads/... 相对路径，必须由后端提供
    location /static/ {
        proxy_pass http://127.0.0.1:8998;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 前端 SPA 路由 ----------
    # React Router(BrowserRouter) 刷新子路由时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 前端静态资源缓存 ----------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
